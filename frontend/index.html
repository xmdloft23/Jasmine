<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loft XMD Hosting - Premium Bot Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen">
    <!-- Navbar -->
    <nav class="bg-black bg-opacity-50 backdrop-blur-md fixed w-full z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">
                Loft XMD Hosting
            </h1>
            <div class="space-x-6">
                <a href="index.html" class="hover:text-purple-400 transition">Home</a>
                <a href="tutorials.html" class="hover:text-purple-400 transition">Tutorials</a>
                <a href="login.html" class="bg-purple-600 px-5 py-2 rounded-lg hover:bg-purple-700 transition">Login</a>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="pt-32 pb-20 text-center">
        <div class="container mx-auto px-6">
            <h2 class="text-5xl md:text-6xl font-bold mb-4">Deploy Your WhatsApp Bot</h2>
            <p class="text-xl text-gray-300 mb-8">Fast, reliable, and affordable hosting for BWM XMD bots</p>
            <a href="#plans" class="bg-purple-600 px-8 py-3 rounded-lg text-lg font-semibold hover:bg-purple-700 transition">View Plans</a>
        </div>
    </section>

    <!-- Plans -->
    <section id="plans" class="py-16">
        <div class="container mx-auto px-6">
            <h3 class="text-3xl font-bold text-center mb-12">Hosting Plans</h3>
            <div class="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-6 gap-6">
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform">
                    <h4 class="text-xl font-bold">10 days</h4>
                    <p class="text-3xl text-purple-400 my-4">20 XD</p>
                    <button onclick="checkAuth('10days')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform">
                    <h4 class="text-xl font-bold">35 days</h4>
                    <p class="text-3xl text-purple-400 my-4">45 XD</p>
                    <button onclick="checkAuth('35days')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform">
                    <h4 class="text-xl font-bold">2 months</h4>
                    <p class="text-3xl text-purple-400 my-4">100 XD</p>
                    <button onclick="checkAuth('2months')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform">
                    <h4 class="text-xl font-bold">3 months</h4>
                    <p class="text-3xl text-purple-400 my-4">150 XD</p>
                    <button onclick="checkAuth('3months')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform">
                    <h4 class="text-xl font-bold">6 months</h4>
                    <p class="text-3xl text-purple-400 my-4">300 XD</p>
                    <button onclick="checkAuth('6months')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
                <div class="bg-gray-800 rounded-xl p-6 text-center hover:scale-105 transition-transform border-2 border-purple-500">
                    <h4 class="text-xl font-bold">1 year</h4>
                    <p class="text-3xl text-purple-400 my-4">600 XD</p>
                    <button onclick="checkAuth('1year')" class="bg-purple-600 w-full py-2 rounded-lg hover:bg-purple-700">Select</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function checkAuth(plan) {
            const token = localStorage.getItem('token');
            if (!token) {
                if(confirm('You need to login first. Go to login page?')) {
                    window.location.href = 'login.html';
                }
            } else {
                window.location.href = 'dashboard.html';
            }
        }
    </script>
</body>
</html>
