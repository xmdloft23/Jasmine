<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loft XMD Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex items-center">
    <div class="container mx-auto px-6 max-w-md">
        <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Welcome Back</h2>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block mb-2">Email Address</label>
                    <input type="email" id="email" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-purple-500" required>
                </div>
                <div class="mb-6">
                    <label class="block mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-purple-500" required>
                </div>
                <button type="submit" class="w-full bg-purple-600 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">Login</button>
            </form>
            <p class="text-center mt-4 text-gray-400">Don't have an account? <a href="register.html" class="text-purple-400 hover:underline">Register</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'https://jasmine-ebjp.onrender.com/api';
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (error) {
                alert('Connection error. Make sure backend is running.');
            }
        });
    </script>
</body>
</html>
