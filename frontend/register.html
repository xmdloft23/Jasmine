<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Loft XMD Hosting</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 text-white min-h-screen flex items-center">
    <div class="container mx-auto px-6 max-w-md">
        <div class="bg-gray-800 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-3xl font-bold text-center mb-6 bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Create Account</h2>
            <form id="registerForm">
                <div class="mb-4">
                    <label class="block mb-2">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-purple-500" required>
                </div>
                <div class="mb-4">
                    <label class="block mb-2">Email Address</label>
                    <input type="email" id="email" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-purple-500" required>
                </div>
                <div class="mb-6">
                    <label class="block mb-2">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-purple-500" required>
                </div>
                <button type="submit" class="w-full bg-purple-600 py-2 rounded-lg font-semibold hover:bg-purple-700 transition">Register</button>
            </form>
            <p class="text-center mt-4 text-gray-400">Already have an account? <a href="login.html" class="text-purple-400 hover:underline">Login</a></p>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('Registration successful! Please login.');
                    window.location.href = 'login.html';
                } else {
                    alert('Registration failed: ' + data.message);
                }
            } catch (error) {
                alert('Connection error. Make sure backend is running.');
            }
        });
    </script>
</body>
</html>
